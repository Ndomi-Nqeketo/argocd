{{- if .Values.server.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: argocd-server-ingress
    namespace: argocd
    annotations:
{{ toYaml .Values.server.ingress.annotations | indent 4 }}
spec:
    rules:
        - host: {{ .Values.server.ingress.hosts | first }}
          http:
            paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                        name: argocd-server
                        port:
                            number: 443
    tls:
        - hosts:
            - {{ .Values.server.ingress.hosts | first }}
          secretName: {{ .Values.server.ingress.tlsSecretName }}
{{- end }}