apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: openebs
    namespace: argocd

spec:
    project: default

    source:
        repoURL: https://github.com/Ndomi-Nqeketo/argocd.git
        targetRevision: HEAD
        path: applications/openebs

    destination:
        server: https://kubernetes.default.svc
        namespace: openebs

    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true