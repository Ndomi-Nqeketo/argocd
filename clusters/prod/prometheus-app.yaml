apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: prometheus
    namespace: argocd
spec:
    project: default

    source:
        repoURL: https://github.com/Ndomi-Nqeketo/argocd.git
        targetRevision: main
        path: applications/prometheus

    destination:
        server: https://kubernetes.default.svc
        namespace: prometheus

    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true