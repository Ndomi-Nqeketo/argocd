kube-prometheus-stack:

  crds:
    enabled: true

  upgradeJob:
    enabled: false

  prometheusOperator:
    enabled: true

  grafana:
    enabled: true

    ingress:
      ingressClassName: traefik
      hosts:
        - grafana.lab.local
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      tls: true

    persistence:
      enabled: true
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi

    adminPassword: admin

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL

  alertmanager:
    enabled: false

  prometheus:
    enabled: true
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      enabled: true
      ingressClassName: traefik
      hosts:
        - prometheus.lab.local
      pathType: Prefix

    prometheusSpec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        runAsNonRoot: false
        seccompProfile:
            type: RuntimeDefault
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi