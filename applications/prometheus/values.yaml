kube-prometheus-stack:

  crds:
    enabled: true

  upgradeJob:
    enabled: false

  prometheusOperator:
    enabled: true

  grafana:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - grafana.lab.local
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
        traefik.ingress.kubernetes.io/service.serversscheme: http
      tls: true
      path: /
    grafana.ini:
      server:
        root_url: https://grafana.lab.local
        serve_from_sub_path: false
    persistence:
      enabled: true
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi
    adminPassword: admin # Change me.

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL

  alertmanager:
    enabled: false

  prometheus:
    enabled: true
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
      enabled: true
      ingressClassName: traefik
      hosts:
        - prometheus.lab.local
      pathType: Prefix

    prometheusSpec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        runAsNonRoot: false
        seccompProfile:
            type: RuntimeDefault
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi