argo-cd:
    global:
        domain: argocd.lab.local
    configs:
        params:
            server.insecure: true

    server:
        ingress:
            enabled: true
            ingressClassName: traefik

            hostname: argocd.lab.local

            annotations:
                cert-manager.io/cluster-issuer: selfsigned-issuer
                traefik.ingress.kubernetes.io/service.serversscheme: http

            tls: true