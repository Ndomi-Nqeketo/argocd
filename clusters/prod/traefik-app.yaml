apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: traefik
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "0"
spec:
    project: default
    source:
        repoURL: https://github.com/Ndomi-Nqeketo/argocd.git
        targetRevision: main
        path: applications/traefik

    destination:
        server: https://kubernetes.default.svc
        namespace: traefik

    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true