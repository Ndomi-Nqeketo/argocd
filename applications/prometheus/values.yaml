kube-prometheus-stack:

  crds:
    enabled: true

  upgradeJob:
    enabled: false

  prometheusOperator:
    enabled: true

  grafana:
    enabled: false

  alertmanager:
    enabled: false

  prometheus:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - prometheus.lab.local
      pathType: Prefix

    prometheusSpec:
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
            type: RuntimeDefault
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi