apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cert-manager
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "0"
spec:
    project: default
    source:
        repoURL: https://github.com/Ndomi-Nqeketo/argocd.git
        path: applications/cert-manager
        targetRevision: main

    destination:
        server: https://kubernetes.default.svc
        namespace: cert-manager

    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true