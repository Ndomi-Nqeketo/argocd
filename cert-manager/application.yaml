apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cert-manager
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://github.com/Ndomi-Nqeketo/argocd.git
        path: applications/cert-manager
        targetRevision: main
        helm:
            valueFiles:
                - values.yaml
    destination:
        server: https://kubernetes.default.svc
        namespace: cert-manager
    syncPolicy:
        automated:
            prune: true
            selfHeal: true